name: Sync upstream and tag

# 上流 getsentry/sentry-native の最新 semver タグを検出し、
# 自リポジトリに v<upstream>-win タグを発行する。
# 上流へは一切送信しない（clone/list の読み取りのみ）。

on:
  schedule:
    - cron: "0 3 1 * *"   # 毎月 1 日 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self (with PAT for tag push)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve latest upstream semver tag
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          UPSTREAM_TAG=$(gh release list -R getsentry/sentry-native --limit 50 --json tagName \
            --jq '.[].tagName' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "ERROR: no semver tag found on upstream"
            exit 1
          fi
          NEW_TAG="v${UPSTREAM_TAG}-win"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved: upstream=$UPSTREAM_TAG  new_tag=$NEW_TAG"

      - name: Check if tag already exists
        id: check
        run: |
          set -e
          NEW_TAG="${{ steps.upstream.outputs.new_tag }}"
          if git ls-remote --tags --refs origin "refs/tags/$NEW_TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $NEW_TAG already exists on origin — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (origin only)
        if: steps.check.outputs.exists == 'false'
        run: |
          set -e
          NEW_TAG="${{ steps.upstream.outputs.new_tag }}"
          UPSTREAM_TAG="${{ steps.upstream.outputs.upstream_tag }}"
          git tag -a "$NEW_TAG" -m "Build for upstream getsentry/sentry-native $UPSTREAM_TAG"
          git push origin "refs/tags/$NEW_TAG"
          echo "Pushed $NEW_TAG — build.yml will take over."

      - name: Summary
        run: |
          echo "upstream_tag : ${{ steps.upstream.outputs.upstream_tag }}"
          echo "new_tag      : ${{ steps.upstream.outputs.new_tag }}"
          echo "existed      : ${{ steps.check.outputs.exists }}"
